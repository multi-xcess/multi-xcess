<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta name="twitter:card" content="summary_large_image">

  <meta name="twitter:image" content="https://multi-xcess.github.io/multi-xcess/peaceful-bench.jpg">

  <meta property="og:type" content="website">

  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">

  <style>
    body { font-family: sans-serif; text-align: center; padding-top: 50px; background-color: #f4f4f4; }
    .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    img { width: 100%; border-radius: 10px; margin-bottom: 20px; }
    .loader { color: #555; font-size: 18px; }
  </style>
</head>
<body>

  <div class="container">
    <h1>Peaceful Wooden Bench</h1>
    <img src="https://multi-xcess.github.io/multi-xcess/peaceful-bench.jpg" alt="Wooden Bench">
    
    <div class="loader">
      <p>Redirecting to gallery in <span id="countdown">5</span> seconds...</p>
      <p><small>If you are not redirected, <a href="YOUR_MONEY_TAG_LINK_HERE">click here</a>.</small></p>
    </div>
  </div>

  <script>
    // Countdown Display
    var timeleft = 4 ;
    var downloadTimer = setInterval(function(){
      if(timeleft <= 0){
        clearInterval(downloadTimer);
      } else {
        document.getElementById("countdown").innerHTML = timeleft;
      }
      timeleft -= 1;
    }, 1000);

    // JavaScript Redirect Backup
    setTimeout(function(){
       window.location.href = 'https://unsplash.com/s/photos/cricket';
    }, 5000); 
  </script>

</body>
</html>
